disabled_rules:
  - trailing_comma
  - identifier_name

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional

line_length:
  warning: 120
  error: 150

function_body_length:
  warning: 10
  error: 20

type_body_length:
  warning: 100
  error: 150

file_length:
  warning: 200
  error: 300

function_parameter_count:
  warning: 3
  error: 4

nesting:
  type_level: 1
  function_level: 2

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
